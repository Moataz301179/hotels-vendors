version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotels-vendors-db
    environment:
      POSTGRES_USER: hotels_vendors
      POSTGRES_PASSWORD: hotels_vendors_dev
      POSTGRES_DB: hotels_vendors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotels_vendors -d hotels_vendors"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotels-vendors-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
