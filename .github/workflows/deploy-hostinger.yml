name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
          log-public-key: false

      - name: Add Hostinger to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HOSTINGER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_IP }} << 'EOF'
            set -e
            echo "═══════════════════════════════════════════"
            echo "  Hotels Vendors — Auto Deploy Started"
            echo "  Commit: ${{ github.sha }}"
            echo "═══════════════════════════════════════════"

            cd /var/www/hotelsvendors

            echo "[1/6] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/6] Installing dependencies..."
            npm ci --legacy-peer-deps

            echo "[3/6] Building..."
            npm run build

            echo "[4/6] Ensuring PM2 is installed..."
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            echo "[5/6] Reloading app with PM2..."
            pm2 reload hotelsvendors-production --update-env || pm2 start deploy/pm2-config.json

            echo "[6/6] Saving PM2 process list..."
            pm2 save

            echo "═══════════════════════════════════════════"
            echo "  Deploy Complete"
            echo "═══════════════════════════════════════════"
          EOF

      - name: Verify deployment
        run: |
          sleep 5
          curl -sfI http://${{ secrets.HOSTINGER_IP }}:3000 || echo "Health check skipped — server may use different port"
